<style>
  :root{
    --dusk:#191c24;
    --dusk-2:#21252f;
    --card:#262b37;
    --card-edge:#333a48;
    --mist:#eae5db;
    --mist-dim:#8b919f;
    --mist-faint:#565d6c;
    --ember:#e6a45c;
    --breath-a:#a6d8cb;
    --breath-b:#5d9b8d;
    --r:18px;
    --serif:"Fraunces",Georgia,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--dusk);color:var(--mist);font-family:var(--sans)}
  body{max-width:460px;margin:0 auto;padding:22px 18px 34px;min-height:100vh;
    background:radial-gradient(120% 80% at 50% -10%,#23283400 0%,#23283400 40%,#1d2128 100%),var(--dusk)}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist-faint);font-weight:600}

  /* ---------- header ---------- */
  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .greet{font-family:var(--serif);font-size:27px;font-weight:500;line-height:1.1;letter-spacing:-.01em}
  .date{font-size:13px;color:var(--mist-dim);margin-top:4px}
  .streak{flex-shrink:0;text-align:right;border:1px solid var(--card-edge);border-radius:999px;
    padding:7px 13px;font-size:12.5px;color:var(--mist-dim);white-space:nowrap}
  .streak b{color:var(--ember);font-weight:600}

  /* ---------- hero orb + ring ---------- */
  .hero{display:flex;flex-direction:column;align-items:center;margin:26px 0 30px}
  .ringwrap{position:relative;width:212px;height:212px}
  .ringwrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
  .seg-bg{fill:none;stroke:#2f3543;stroke-width:5;stroke-linecap:round}
  .seg-fg{fill:none;stroke:var(--ember);stroke-width:5;stroke-linecap:round;
    opacity:0;transition:opacity .5s ease}
  .seg-fg.on{opacity:1}
  .orb{position:absolute;left:50%;top:50%;width:128px;height:128px;border-radius:50%;
    transform:translate(-50%,-50%) scale(.86);
    background:radial-gradient(circle at 38% 33%,var(--breath-a),var(--breath-b) 72%);
    box-shadow:0 0 40px -4px rgba(123,196,180,.45),inset 0 0 30px -8px rgba(255,255,255,.5);
    animation:idle 9s ease-in-out infinite}
  @keyframes idle{0%,100%{transform:translate(-50%,-50%) scale(.82)}50%{transform:translate(-50%,-50%) scale(.99)}}
  .orb-cap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;
    pointer-events:none}
  .orb-cap .n{font-family:var(--serif);font-size:30px;font-weight:500;color:#0f231f}
  .orb-cap .l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#1c3b35;font-weight:600;margin-top:1px}
  .hero-sub{margin-top:18px;font-size:13.5px;color:var(--mist-dim);text-align:center;line-height:1.5}

  /* ---------- technique cards ---------- */
  .cards{display:flex;flex-direction:column;gap:11px}
  .card{position:relative;display:flex;align-items:center;gap:14px;text-align:left;width:100%;
    background:var(--card);border:1px solid var(--card-edge);border-radius:var(--r);padding:15px 16px;
    transition:transform .15s ease,border-color .2s ease}
  .card:active{transform:scale(.985)}
  .card.now{border-color:rgba(230,164,92,.55)}
  .card.done{background:var(--dusk-2)}
  .dot{flex-shrink:0;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
    background:#2e3543;color:var(--mist-dim);font-size:18px}
  .card.done .dot{background:rgba(230,164,92,.16);color:var(--ember)}
  .c-main{flex:1;min-width:0}
  .c-when{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-faint);font-weight:600}
  .c-name{font-family:var(--serif);font-size:18px;font-weight:500;margin:1px 0 3px;letter-spacing:-.01em}
  .c-meta{font-size:12.5px;color:var(--mist-dim)}
  .c-meta .pat{color:var(--mist);font-variant-numeric:tabular-nums}
  .c-go{flex-shrink:0;font-size:20px;color:var(--mist-faint)}
  .card.done .c-go{color:var(--ember)}
  .nowtag{position:absolute;top:-8px;right:14px;background:var(--ember);color:#1a1206;
    font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:999px}

  .undo{display:block;margin:8px 4px 0;font-size:12px;color:var(--mist-faint);background:none;text-decoration:underline}

  /* ---------- history ---------- */
  .hist{margin-top:26px}
  .hist .eyebrow{margin-bottom:13px}
  .week{display:flex;justify-content:space-between}
  .day{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
  .day .wd{font-size:11px;color:var(--mist-faint)}
  .day.today .wd{color:var(--mist)}
  .pip{width:15px;height:15px;border-radius:50%;border:1.5px solid #3a414f;background:transparent}
  .pip.part{border-color:var(--breath-b);background:transparent;box-shadow:inset 0 0 0 3px var(--breath-b)}
  .pip.full{border-color:var(--ember);background:var(--ember)}
  .day.today .pip{outline:2px solid rgba(255,255,255,.14);outline-offset:2px}

  .tips{margin-top:24px;font-size:12.5px;color:var(--mist-dim);line-height:1.65;
    border-top:1px solid #2a3040;padding-top:16px}
  .tips b{color:var(--mist);font-weight:600}

  /* ---------- session overlay ---------- */
  .ses{position:fixed;inset:0;background:linear-gradient(180deg,#1a1e26,#14171d);
    display:none;flex-direction:column;z-index:30;padding:20px 18px 28px}
  .ses.open{display:flex}
  .ses-top{display:flex;justify-content:space-between;align-items:center}
  .ses-name{font-family:var(--serif);font-size:17px;font-weight:500}
  .ses-x{font-size:15px;color:var(--mist-dim);padding:6px 4px}
  .ses-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .pacer{width:220px;height:220px;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle at 38% 33%,var(--breath-a),var(--breath-b) 72%);
    box-shadow:0 0 60px -6px rgba(123,196,180,.5),inset 0 0 40px -10px rgba(255,255,255,.55);
    transform:scale(.4);will-change:transform}
  .pacer .pn{font-family:var(--serif);font-size:54px;font-weight:500;color:#0e201d;line-height:1;
    font-variant-numeric:tabular-nums}
  .phase{margin-top:34px;font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.01em;
    min-height:38px;transition:opacity .25s ease}
  .ses-meta{margin-top:10px;font-size:13px;color:var(--mist-dim);font-variant-numeric:tabular-nums;text-align:center}
  .reached{margin-top:14px;font-size:12.5px;color:var(--ember);opacity:0;transition:opacity .4s ease;text-align:center}
  .reached.on{opacity:1}
  .ses-foot{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .btn-done{background:var(--ember);color:#1a1206;font-weight:600;font-size:15px;
    padding:15px;border-radius:14px;width:100%}
  .btn-done:active{transform:scale(.99)}
  .ses-hint{font-size:12px;color:var(--mist-faint);text-align:center;line-height:1.5}

  :focus-visible{outline:2px solid var(--ember);outline-offset:3px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){.orb{animation:none}}
</style>
</head>
<body>
<header>
  <div>
    <div class="greet" id="greet">Merhaba</div>
    <div class="date" id="date"></div>
  </div>
  <div class="streak" id="streak" hidden></div>
</header>

<div class="hero">
  <div class="ringwrap">
    <svg viewBox="0 0 212 212" id="ring" aria-hidden="true"></svg>
    <div class="orb" id="heroOrb"></div>
    <div class="orb-cap"><div class="n" id="heroN">0/3</div><div class="l">bugün</div></div>
  </div>
  <div class="hero-sub" id="heroSub"></div>
</div>

<div class="cards" id="cards"></div>

<div class="hist">
  <div class="eyebrow">Son 7 gün</div>
  <div class="week" id="week"></div>
</div>

<div class="tips">
  <b>Hatırlatma:</b> Nefesi karnından al — göğsün değil, karnın şişsin. Verme süresi
  almadan hep biraz uzun olsun; asıl sakinleştiren kısım o. Baş dönerse normaldir,
  temponu yavaşlat.
</div>

<!-- session overlay -->
<div class="ses" id="ses" role="dialog" aria-modal="true" aria-label="Nefes seansı">
  <div class="ses-top">
    <div class="ses-name" id="sesName"></div>
    <button class="ses-x" id="sesX">Kapat</button>
  </div>
  <div class="ses-stage">
    <div class="pacer" id="pacer"><span class="pn" id="pn">4</span></div>
    <div class="phase" id="phase">Hazır ol</div>
    <div class="ses-meta" id="sesMeta"></div>
    <div class="reached" id="reached">Hedefe ulaştın — istediğin kadar devam edebilir, dilediğinde bitirebilirsin.</div>
  </div>
  <div class="ses-foot">
    <button class="btn-done" id="btnDone">Tamamla</button>
    <div class="ses-hint" id="sesHint"></div>
  </div>
</div>
<script>
// ---------------- techniques ----------------
const TECH = {
  morning:{
    when:"Sabah", name:"Kutu Nefesi", patLabel:"4·4·4·4", meta:"~5 dk · güne dengeli başla",
    target:300,
    phases:[
      {l:"Al",      d:4, s:1.0},
      {l:"Tut",     d:4, s:1.0},
      {l:"Ver",     d:4, s:0.42},
      {l:"Bekle",   d:4, s:0.42},
    ],
    hint:"Sırtın dik, omuzlar gevşek. Sayıları takip et, orb büyürken al, küçülürken ver."
  },
  sigh:{
    when:"Gün içi", name:"Fizyolojik İç Çekiş", patLabel:"hızlı sakinleşme", meta:"~30 sn · gerginlik anında",
    target:45,
    phases:[
      {l:"Al",          d:1.5, s:0.75},
      {l:"Biraz daha",  d:1.0, s:1.0},
      {l:"Yavaşça ver", d:5.0, s:0.34},
      {l:"Bekle",       d:1.0, s:0.34},
    ],
    hint:"İki kısa nefesle akciğeri tam doldur, sonra ağzından uzun uzun bırak. 3-5 kez yeter."
  },
  evening:{
    when:"Akşam", name:"4-7-8 Tekniği", patLabel:"4·7·8", meta:"~2 dk · uykuya geçiş",
    target:120,
    phases:[
      {l:"Al",  d:4, s:1.0},
      {l:"Tut", d:7, s:1.0},
      {l:"Ver", d:8, s:0.40},
    ],
    hint:"Işıklar kapalı, yatakta. Ağzından verirken hafif 'fff' sesi çıkar."
  },
};
const ORDER = ["morning","sigh","evening"];

// ---------------- date helpers ----------------
const WD = ["Pz","Pt","Sa","Ça","Pe","Cu","Ct"];
function key(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function today(){return key(new Date());}

// ---------------- storage (with in-memory fallback) ----------------
const SKEY="breath-tracker-v1";
let DATA={logs:{}};
async function load(){
  try{ const v=localStorage.getItem(SKEY); if(v) DATA=JSON.parse(v); }catch(e){}
  if(!DATA.logs) DATA.logs={};
}
async function save(){
  try{ localStorage.setItem(SKEY, JSON.stringify(DATA)); }catch(e){}
}
function todayLog(){ const t=today(); if(!DATA.logs[t]) DATA.logs[t]={morning:false,sigh:false,evening:false}; return DATA.logs[t]; }

// ---------------- ring ----------------
function buildRing(){
  const svg=document.getElementById("ring"); const cx=106,cy=106,r=92;
  let h="";
  for(let i=0;i<3;i++){
    const rot=i*120; // each segment ~30% with gaps
    h+=`<circle class="seg-bg" cx="${cx}" cy="${cy}" r="${r}" pathLength="100" stroke-dasharray="30 70" transform="rotate(${rot} ${cx} ${cy})"/>`;
  }
  for(let i=0;i<3;i++){
    const rot=i*120;
    h+=`<circle class="seg-fg" id="fg${i}" cx="${cx}" cy="${cy}" r="${r}" pathLength="100" stroke-dasharray="30 70" transform="rotate(${rot} ${cx} ${cy})"/>`;
  }
  svg.innerHTML=h;
}

// ---------------- render ----------------
function renderHeader(){
  const now=new Date(), h=now.getHours();
  let g="İyi günler";
  if(h<11) g="Günaydın"; else if(h>=18) g="İyi akşamlar";
  document.getElementById("greet").textContent=g;
  const months=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const days=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  document.getElementById("date").textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

  // streak: consecutive full days (morning+evening) ending today or yesterday
  let s=0; const d=new Date();
  if(!isFull(DATA.logs[key(d)])) d.setDate(d.getDate()-1);
  while(isFull(DATA.logs[key(d)])){ s++; d.setDate(d.getDate()-1); }
  const chip=document.getElementById("streak");
  if(s>0){ chip.hidden=false; chip.innerHTML=`<b>${s}</b> günlük seri`; } else chip.hidden=true;
}
function isFull(l){ return !!(l&&l.morning&&l.evening); }
function suggestedId(){ const h=new Date().getHours(); if(h<11) return "morning"; if(h>=18) return "evening"; return "sigh"; }

function renderHero(){
  const l=todayLog(); const done=ORDER.filter(k=>l[k]).length;
  document.getElementById("heroN").textContent=done+"/3";
  ORDER.forEach((k,i)=>document.getElementById("fg"+i).classList.toggle("on",l[k]));
  const sub=document.getElementById("heroSub");
  if(done===0) sub.textContent="Bugünün ilk nefesi seni bekliyor. Bir kart seç, başla.";
  else if(done===3) sub.textContent="Üç seansı da tamamladın. Güzel iş — vücudun teşekkür ediyor.";
  else sub.textContent=`Bugün ${done} seans tamam. Kalan rutinine devam edebilirsin.`;
}

function renderCards(){
  const l=todayLog(); const sug=suggestedId();
  const wrap=document.getElementById("cards"); wrap.innerHTML="";
  ORDER.forEach(id=>{
    const t=TECH[id]; const done=l[id];
    const card=document.createElement("div");
    const block=document.createElement("button");
    block.className="card"+(done?" done":"")+(id===sug&&!done?" now":"");
    block.setAttribute("aria-label",t.name+" başlat");
    block.innerHTML=`
      ${id===sug&&!done?'<span class="nowtag">şu an için</span>':''}
      <span class="dot">${done?'&#10003;':'&#9711;'}</span>
      <span class="c-main">
        <span class="c-when">${t.when}</span>
        <span class="c-name">${t.name}</span>
        <span class="c-meta"><span class="pat">${t.patLabel}</span> · ${t.meta}</span>
      </span>
      <span class="c-go">${done?'&#10003;':'&#8250;'}</span>`;
    block.onclick=()=>openSession(id);
    card.appendChild(block);
    if(done){
      const u=document.createElement("button");
      u.className="undo"; u.textContent="geri al";
      u.onclick=async(e)=>{e.stopPropagation(); todayLog()[id]=false; await save(); renderAll();};
      card.appendChild(u);
    }
    wrap.appendChild(card);
  });
}

function renderWeek(){
  const wrap=document.getElementById("week"); wrap.innerHTML="";
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const l=DATA.logs[key(d)]; const n=l?ORDER.filter(k=>l[k]).length:0;
    let cls="pip"; if(isFull(l)) cls+=" full"; else if(n>0) cls+=" part";
    const col=document.createElement("div");
    col.className="day"+(i===0?" today":"");
    col.innerHTML=`<span class="wd">${WD[d.getDay()]}</span><span class="${cls}"></span>`;
    wrap.appendChild(col);
  }
}
function renderAll(){ renderHeader(); renderHero(); renderCards(); renderWeek(); }

// ---------------- session engine ----------------
let SES=null, raf=null;
function fmt(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

function openSession(id){
  const t=TECH[id];
  document.getElementById("sesName").textContent=t.when+" · "+t.name;
  document.getElementById("sesHint").textContent=t.hint;
  document.getElementById("reached").classList.remove("on");
  document.getElementById("phase").textContent="Hazır ol…";
  document.getElementById("sesMeta").textContent="";
  const pacer=document.getElementById("pacer");
  pacer.style.transition="none"; pacer.style.transform="scale(.4)";
  document.getElementById("pn").textContent="";
  document.getElementById("ses").classList.add("open");

  SES={id,t,pi:-1,phaseElapsed:0,total:0,round:0,last:null,reached:false};
  // small delay then begin
  setTimeout(()=>{ if(SES&&SES.id===id){ SES.last=performance.now(); enterPhase(0); raf=requestAnimationFrame(loop);} }, 700);
}

function enterPhase(i){
  const p=SES.t.phases[i]; SES.pi=i; SES.phaseElapsed=0;
  const pacer=document.getElementById("pacer");
  pacer.style.transition=`transform ${p.d}s linear`;
  pacer.style.transform=`scale(${p.s})`;
  const ph=document.getElementById("phase");
  ph.style.opacity=0;
  setTimeout(()=>{ph.textContent=p.l; ph.style.opacity=1;},120);
}

function loop(ts){
  if(!SES){return;}
  const dt=(ts-SES.last)/1000; SES.last=ts;
  SES.phaseElapsed+=dt; SES.total+=dt;
  const p=SES.t.phases[SES.pi];
  const remain=Math.max(0,Math.ceil(p.d-SES.phaseElapsed));
  document.getElementById("pn").textContent=remain;
  document.getElementById("sesMeta").textContent=`${SES.round+1}. tur · ${fmt(SES.total)} / ${fmt(SES.t.target)}`;
  if(!SES.reached && SES.total>=SES.t.target){ SES.reached=true; document.getElementById("reached").classList.add("on"); }
  if(SES.phaseElapsed>=p.d){
    let ni=SES.pi+1;
    if(ni>=SES.t.phases.length){ ni=0; SES.round++; }
    enterPhase(ni);
  }
  raf=requestAnimationFrame(loop);
}

function closeSession(){
  if(raf) cancelAnimationFrame(raf); raf=null; SES=null;
  document.getElementById("ses").classList.remove("open");
}
async function completeSession(){
  if(SES){ todayLog()[SES.id]=true; await save(); }
  closeSession(); renderAll();
}

document.getElementById("sesX").onclick=closeSession;
document.getElementById("btnDone").onclick=completeSession;
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&document.getElementById("ses").classList.contains("open")) closeSession(); });

// ---------------- init ----------------
(async function init(){
  buildRing();
  await load();
  renderAll();
})();
</script>

</body>
</html>
